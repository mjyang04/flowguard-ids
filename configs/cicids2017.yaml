data:
  data_dir: data/raw
  processed_dir: data/processed
  train_dataset: cicids2017
  test_dataset: cicids2017
  data_percentage: 100
  batch_size: 128
  num_workers: 0
  train_ratio: 0.8
  val_ratio: 0.1
  scaler_type: minmax
  label_mode: binary
  random_state: 42
  stratify: true

model:
  name: cnn_bilstm_se
  input_dim: 55
  num_classes: 2
  conv_channels: [64, 128]
  conv_kernel_sizes: [3, 3]
  conv_pool_sizes: [2, 2]
  lstm_hidden_size: 128
  lstm_num_layers: 2
  dropout: 0.3
  bidirectional: true
  use_se: true
  use_attention: false

training:
  num_epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: adam
  use_scheduler: true
  scheduler: plateau
  scheduler_factor: 0.5
  scheduler_patience: 2
  min_learning_rate: 0.000001
  use_early_stopping: true
  early_stopping_patience: 5
  early_stopping_delta: 0.0001
  gradient_clip: 1.0
  amp: true
  selection_metric: recall_at_far_1pct
  use_tqdm: true
  show_eval_tqdm: false

shap:
  n_samples: 2000
  background_size: 100
  top_k: 30
  top_k_choices: [20, 30, 50]
  reference_train_dataset: cicids2017
  reference_test_dataset: cicids2017
  reference_model_name: cnn_bilstm_se
  cumulative_threshold: 0.9

runtime:
  output_dir: artifacts
  seed: 42
  device: auto
